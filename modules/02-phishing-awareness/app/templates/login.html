<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBird · 로그인</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem;
      color: #1c1e21;
    }
    .wrap { width: 100%; max-width: 392px; }
    .brand { text-align: center; margin-bottom: 1.5rem; }
    .brand .name { font-size: 2.25rem; font-weight: 800; letter-spacing: -0.04em; color: #1877f2; }
    .brand .tag { color: #606770; font-size: .95rem; margin-top: .2rem; }
    .card {
      background: #fff; border-radius: 14px; padding: 1.75rem;
      box-shadow: 0 2px 14px rgba(0,0,0,.12);
    }
    .promo {
      display: flex; gap: .55rem; align-items: center;
      background: #f0f7ff; border: 1px solid #d4e5fb; color: #1d4577;
      font-size: .82rem; padding: .6rem .8rem; border-radius: 9px; margin-bottom: 1.1rem;
    }
    input {
      width: 100%; padding: .85rem .9rem; border: 1px solid #dddfe2; border-radius: 8px;
      font-size: 1rem; margin-bottom: .7rem; font-family: inherit;
    }
    input:focus { outline: none; border-color: #1877f2; box-shadow: 0 0 0 2px rgba(24,119,242,.15); }
    button {
      width: 100%; padding: .8rem; border: none; border-radius: 8px;
      background: #1877f2; color: #fff; font-size: 1.05rem; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #166fe5; }
    .forgot { display: block; text-align: center; color: #1877f2; font-size: .85rem; margin-top: 1rem; text-decoration: none; }
    .sep { border: 0; border-top: 1px solid #dadde1; margin: 1.1rem 0; }
    .create { display: block; width: max-content; margin: 0 auto; background: #42b72a; color: #fff; padding: .7rem 1rem; border-radius: 8px; font-weight: 700; font-size: .95rem; border: none; cursor: pointer; }
    .foot { text-align: center; color: #8a8d91; font-size: .78rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="name">SkyBird</div>
      <div class="tag">친구들과 일상을 나누는 공간</div>
    </div>
    <div class="card">
      <div class="promo">
        <span>🎁</span>
        <span>지금 다시 로그인하면 한정판 프로필 뱃지를 드려요. 오늘까지!</span>
      </div>
      <form action="/login" method="post">
        <input type="text" name="username" placeholder="이메일 또는 휴대폰 번호" autocomplete="off" required />
        <input type="password" name="password" placeholder="비밀번호" autocomplete="off" required />
        <button type="submit">로그인</button>
        <a href="#" class="forgot">비밀번호를 잊으셨나요?</a>
        <hr class="sep" />
        <button type="button" class="create">새 계정 만들기</button>
      </form>
    </div>
    <p class="foot">SkyBird · 한국어 · English · 日本語 · 도움말</p>
  </div>
</body>
</html>
