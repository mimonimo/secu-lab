<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyBird 로그인</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #5b8def 0%, #8e54e9 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .logo { text-align: center; font-size: 2rem; font-weight: 800; color: #5b8def; margin-bottom: .25rem; }
    .logo span { color: #8e54e9; }
    .sub { text-align: center; color: #888; font-size: .85rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: .8rem; color: #555; margin: 1rem 0 .35rem; }
    input {
      width: 100%; padding: .75rem .9rem; border: 1px solid #ddd; border-radius: 8px; font-size: .95rem;
    }
    input:focus { outline: none; border-color: #5b8def; }
    button {
      width: 100%; margin-top: 1.5rem; padding: .8rem; border: none; border-radius: 8px;
      background: #5b8def; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #4a7ce0; }
    .foot { text-align: center; font-size: .75rem; color: #aaa; margin-top: 1.25rem; }
    .promo { background: #fff7e6; border: 1px solid #ffe0a3; color: #8a6d3b; font-size: .8rem;
      padding: .6rem .8rem; border-radius: 8px; margin-bottom: 1.25rem; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Sky<span>Bird</span></div>
    <div class="sub">친구들과 일상을 공유하세요</div>

    <div class="promo">🎁 지금 로그인하면 한정판 프로필 뱃지를 드려요!</div>

    <form action="/login" method="post">
      <label for="username">아이디 또는 이메일</label>
      <input type="text" id="username" name="username" autocomplete="off" required />
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" autocomplete="off" required />
      <button type="submit">로그인</button>
    </form>

    <div class="foot">비밀번호를 잊으셨나요? · 계정 만들기</div>
  </div>
</body>
</html>
