<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TalkSpot{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="/static/lab.css" />
  <style>
    .ts-nav-link { padding: .3rem .1rem; }
    .ts-nav-link.active { color: var(--brand); font-weight: 700; }
    .comment-item { padding: .9rem 0; border-bottom: 1px solid var(--border); }
    .comment-item:last-child { border-bottom: none; }
    .comment-meta { font-size: .78rem; color: var(--faint); margin-bottom: .35rem; }
  </style>
</head>
<body>
  <nav class="lab-nav">
    <div class="lab-nav-inner">
      <span class="lab-brand"><span class="mark">T</span>TalkSpot</span>
      <a class="ts-nav-link" href="/">홈</a>
      <a class="ts-nav-link" href="/board">방명록</a>
      <a class="ts-nav-link" href="/mypage">마이페이지</a>
      <a class="ts-nav-link" href="/attacker">공격자 콘솔</a>
      <span class="spacer"></span>
      {% if safe_mode %}
        <span class="badge badge-success"><span class="dot"></span>안전 모드</span>
      {% else %}
        <span class="badge badge-danger"><span class="dot"></span>취약 모드</span>
      {% endif %}
    </div>
  </nav>
  <main class="lab-main">
    {% block body %}{% endblock %}
  </main>
</body>
</html>
