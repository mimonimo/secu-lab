# 회차별 커리큘럼 정의.
# 대시보드가 이 파일을 읽어 각 회차의 제목/목표를 보여줍니다.
# session 번호는 각 모듈 module.yaml 의 session 값과 연결됩니다.
#   (폴더 번호 01~04 = 회차 1~4 로 일치시켰습니다.)
# 이 파일을 수정하면 대시보드에 바로 반영됩니다(서버 재시작 불필요).
sessions:
  - session: 1
    title: "웹 해킹 입문"
    goal: "취약한 웹앱을 직접 공격해보며 'OWASP Top 10'의 감을 잡는다."
  - session: 2
    title: "피싱과 사회공학"
    goal: "사람을 속이는 공격을 체험하고, 속지 않는 눈을 기른다."
  - session: 3
    title: "쿠키·세션과 XSS"
    goal: "로그인 상태가 어떻게 유지되고, 어떻게 탈취되는지 이해한다."
  - session: 4
    title: "사이트 복제와 식별"
    goal: "겉모습 복제의 한계를 알고, 진짜/가짜를 주소창으로 가린다."
